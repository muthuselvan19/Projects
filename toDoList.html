<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 1 - To-DoList</title>
    <link rel="stylesheet" href="toDoList.css">
</head>

<body>
    <div class="centering">
        <h1 class="header">
            To-Do-List Web-Application
        </h1>
    </div>

    <div class="input_tag">
        <input id="task" type="text" class="get_tag" placeholder="Enter Your Task">
        <input id="submmission" type="submit" class="sumbit_tag" value="Add to Task">
        <input id="clearing" type="reset" value="Clear" class="reset_tag">
    </div>
    <br>
    <hr>

    <div class="h3_tag">
        <h3 class="list_of_task">
            List of Task's
        </h3>
    </div>

    <ul id="list_of_operation" class="ul_tag_list"></ul>
    <br>
    <hr>


    <div class="h2_tag">
        <h2 class="Complete_Class">Completed Task's </h2>
    </div>


    <div class="over_tasks">
        <ol id="Completed_Task" class="tasks"></ol>
    </div>


    <p id ="op"> Task Completing Status....</p>

    <script src="toDoList.js"></script>
</body>

</html>
